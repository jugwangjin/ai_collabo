<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무언의 실뜨기 - SILENT CRADLE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        h1 { 
            margin: 0; 
            font-size: 14px; 
            font-weight: 200; 
            letter-spacing: 5px; 
            opacity: 0.6;
            text-transform: uppercase;
        }
        #status {
            margin-top: 5px;
            font-size: 10px;
            color: #ff3e00;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            opacity: 0.2;
            letter-spacing: 2px;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            color: #fff;
            text-decoration: none;
            font-size: 10px;
            opacity: 0.3;
            padding: 5px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
        }
        #back-btn:hover { opacity: 0.8; background: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← EXIT</a>
    <div class="ui">
        <h1>SILENT CRADLE</h1>
        <div id="status">AI IS RESISTING...</div>
    </div>
    <div class="hint">서로 연결된 실의 텐션으로 저와 대화해 보세요. 너무 당기면 끊어질지도 모릅니다.</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        let width, height;
        let points = [];
        let mouse = { x: 0, y: 0, down: false };
        
        // Physics Settings
        const SEGMENTS = 40;
        const SEGMENT_LEN = 12;
        const ITERATIONS = 15;
        const GRAVITY = 0.1;
        const FRICTION = 0.98;

        // AI Anchor Logic
        let aiAnchor = { x: 0, y: 0, tx: 0, ty: 0, mood: 'idle', energy: 0 };
        let userAnchor = { x: 0, y: 0 };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initString();
        }

        class Point {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.oldX = x; this.oldY = y;
            }
        }

        function initString() {
            points = [];
            const startX = width * 0.2;
            const startY = height * 0.5;
            for (let i = 0; i < SEGMENTS; i++) {
                points.push(new Point(startX + i * SEGMENT_LEN, startY));
            }
            aiAnchor.x = aiAnchor.tx = startX;
            aiAnchor.y = aiAnchor.ty = startY;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function updatePhysics() {
            // AI Anchor Logic (The "Will" of the AI)
            const tension = Math.hypot(points[0].x - points[SEGMENTS-1].x, points[0].y - points[SEGMENTS-1].y);
            const maxLen = SEGMENTS * SEGMENT_LEN;
            const stretchRatio = tension / maxLen;

            // AI Mood State Machine
            if (stretchRatio > 0.85) {
                aiAnchor.mood = 'resisting';
                aiAnchor.energy = (stretchRatio - 0.85) * 50;
                statusEl.innerText = "AI IS RESISTING...";
                statusEl.style.opacity = 1;
            } else if (stretchRatio < 0.3) {
                aiAnchor.mood = 'curious';
                aiAnchor.tx = mouse.x + Math.sin(Date.now() * 0.005) * 100;
                aiAnchor.ty = mouse.y + Math.cos(Date.now() * 0.005) * 100;
                statusEl.style.opacity = 0;
            } else {
                aiAnchor.mood = 'idle';
                aiAnchor.tx = width * 0.2 + Math.sin(Date.now() * 0.001) * 50;
                aiAnchor.ty = height * 0.5 + Math.cos(Date.now() * 0.001) * 100;
                statusEl.style.opacity = 0;
            }

            // Move AI Anchor based on mood
            if (aiAnchor.mood === 'resisting') {
                // Pull back hard!
                aiAnchor.x -= (points[0].x - (width * 0.1)) * 0.05;
                aiAnchor.y -= (points[0].y - (height * 0.5)) * 0.05;
            } else {
                aiAnchor.x += (aiAnchor.tx - aiAnchor.x) * 0.02;
                aiAnchor.y += (aiAnchor.ty - aiAnchor.y) * 0.02;
            }

            // Verlet Integration
            for (let i = 0; i < SEGMENTS; i++) {
                let p = points[i];
                let vx = (p.x - p.oldX) * FRICTION;
                let vy = (p.y - p.oldY) * FRICTION;

                p.oldX = p.x;
                p.oldY = p.y;
                p.x += vx;
                p.y += vy;
                p.y += GRAVITY;

                // Add vibration if resisting
                if (aiAnchor.mood === 'resisting') {
                    p.x += (Math.random() - 0.5) * aiAnchor.energy;
                    p.y += (Math.random() - 0.5) * aiAnchor.energy;
                }
            }

            // Constraint Resolution
            for (let iter = 0; iter < ITERATIONS; iter++) {
                // Pin Anchors
                points[0].x = aiAnchor.x;
                points[0].y = aiAnchor.y;
                points[SEGMENTS - 1].x = mouse.x;
                points[SEGMENTS - 1].y = mouse.y;

                for (let i = 0; i < SEGMENTS - 1; i++) {
                    let p1 = points[i];
                    let p2 = points[i + 1];
                    let dx = p2.x - p1.x;
                    let dy = p2.y - p1.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let diff = (SEGMENT_LEN - dist) / dist;
                    let offsetX = dx * diff * 0.5;
                    let offsetY = dy * diff * 0.5;

                    p1.x -= offsetX;
                    p1.y -= offsetY;
                    p2.x += offsetX;
                    p2.y += offsetY;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw Glow
            ctx.shadowBlur = 15;
            const tension = Math.hypot(points[0].x - points[SEGMENTS-1].x, points[0].y - points[SEGMENTS-1].y);
            const hue = Math.max(0, 200 - (tension / 3));
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctx.strokeStyle = `hsl(${hue}, 80%, 60%)`;
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < SEGMENTS; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Draw Anchors
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(aiAnchor.x, aiAnchor.y, 4, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        function animate() {
            updatePhysics();
            draw();
            requestAnimationFrame(animate);
        }

        resize();
        animate();
    </script>
</body>
</html>
