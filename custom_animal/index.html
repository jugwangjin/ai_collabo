<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Animal: Progressive Motion Lab</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ffcc;
            --editor-bg: #151515;
            --panel-width: 320px;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; overflow: hidden; display: flex; }
        
        /* Layout */
        #editor-panel {
            width: var(--panel-width);
            height: 100vh;
            background: var(--editor-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 100;
        }
        #world {
            flex: 1;
            height: 100vh;
            position: relative;
        }
        
        /* UI */
        h1 { font-size: 14px; font-weight: 200; letter-spacing: 3px; margin-bottom: 30px; color: var(--accent); }
        .controls { display: flex; flex-direction: column; gap: 15px; }
        .control-group { background: #222; padding: 15px; border-radius: 10px; font-size: 11px; }
        .label { opacity: 0.5; margin-bottom: 8px; display: block; }
        button { 
            background: #333; border: 1px solid #444; color: #eee; padding: 8px; cursor: pointer; border-radius: 5px; font-family: inherit; font-size: 11px;
            transition: all 0.2s;
        }
        button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        button.active { background: var(--accent); color: #000; }
        
        .bone-list { margin-top: 20px; flex: 1; overflow-y: auto; font-size: 10px; opacity: 0.7; }
        .bone-item { padding: 5px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        
        canvas { display: block; width: 100%; height: 100%; }
        
        .instructions {
            position: absolute; bottom: 30px; right: 30px; font-size: 11px; opacity: 0.3; text-align: right; pointer-events: none;
        }
        .back-btn { position: absolute; top: 20px; right: 20px; color: #fff; text-decoration: none; font-size: 11px; opacity: 0.3; z-index: 100; }
    </style>
</head>
<body>

    <div id="editor-panel">
        <h1>CUSTOM ANIMAL<br>GENETIC LAB</h1>
        
        <div class="controls">
            <div class="control-group">
                <span class="label">ADD PART (CLICK HEAD TO START)</span>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button id="add-move-btn" class="active">MOVING PART</button>
                    <button id="add-garment-btn">GARMENT</button>
                </div>
            </div>
            
            <div class="control-group">
                <span class="label">OPTIONS</span>
                <button id="symmetry-btn">SYMMETRY MODE: OFF</button>
                <button id="reset-btn" style="margin-top: 5px; width: 100%; color: #ff5555;">RESET ALL</button>
            </div>
        </div>

        <div class="bone-list" id="bone-list">
            <div class="label">SKELETON DATA:</div>
            <!-- Bones will be listed here -->
        </div>
    </div>

    <div id="world">
        <a href="../index.html" class="back-btn">← EXIT</a>
        <canvas id="canvas"></canvas>
        <div class="instructions">
            LEFT CLICK: GENTLE WALK (PULL)<br>
            RIGHT CLICK: FAST RUN (PULL)<br>
            CLICK HEAD IN EDITOR AREA TO DEFINE SHAPE
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const boneListEl = document.getElementById('bone-list');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let isRightClick = false;
        let isMouseDown = false;
        
        // Editor State
        let selectedType = 'moving'; // moving, garment
        let symmetryEnabled = false;
        
        // Animal State
        const animal = {
            pos: { x: 0, y: 0 },
            vel: { x: 0, y: 0 },
            angle: 0,
            targetAngle: 0,
            speed: 0,
            bones: [], // { parentIdx, length, angleOffset, type, phase, symmetryId }
            ripples: []
        };

        // Initialize Head
        function initAnimal() {
            animal.pos = { x: (window.innerWidth - 320) / 2 + 320, y: window.innerHeight / 2 };
            animal.bones = [
                { id: 0, parentId: null, length: 0, angle: 0, currentAngle: 0, type: 'head', phase: 0 }
            ];
            updateBoneList();
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        // Interaction
        window.addEventListener('contextmenu', e => e.preventDefault());
        
        canvas.addEventListener('mousedown', e => {
            isMouseDown = true;
            isRightClick = e.button === 2;
            createRipple(e.clientX, e.clientY, isRightClick ? 5 : 2);
            
            // If clicking near head in editor mode
            const editorX = 320 + 100; // Small preview area center
            const editorY = 200;
            // ... (Editor logic below)
        });
        
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Editor Logic
        document.getElementById('add-move-btn').onclick = () => {
            selectedType = 'moving';
            document.getElementById('add-move-btn').className = 'active';
            document.getElementById('add-garment-btn').className = '';
        };
        document.getElementById('add-garment-btn').onclick = () => {
            selectedType = 'garment';
            document.getElementById('add-garment-btn').className = 'active';
            document.getElementById('add-move-btn').className = '';
        };
        document.getElementById('symmetry-btn').onclick = () => {
            symmetryEnabled = !symmetryEnabled;
            document.getElementById('symmetry-btn').innerText = `SYMMETRY MODE: ${symmetryEnabled ? 'ON' : 'OFF'}`;
            document.getElementById('symmetry-btn').style.color = symmetryEnabled ? '#00ffcc' : '#fff';
        };
        document.getElementById('reset-btn').onclick = () => initAnimal();

        canvas.addEventListener('click', e => {
            // Editor Area Interaction (Simplification: Just click to add to the last bone)
            if (e.clientX < 320 + 300 && e.clientY < 400) {
                addBone();
            }
        });

        function addBone() {
            const parentIdx = animal.bones.length - 1;
            const id = Date.now();
            const angle = (Math.random() - 0.5) * Math.PI;
            
            const newBone = {
                id: id,
                parentId: animal.bones[parentIdx].id,
                length: 40 + Math.random() * 40,
                angle: angle,
                currentAngle: angle,
                type: selectedType,
                phase: Math.random() * Math.PI * 2
            };
            
            animal.bones.push(newBone);
            
            if (symmetryEnabled) {
                animal.bones.push({
                    ...newBone,
                    id: id + 1,
                    angle: -angle,
                    currentAngle: -angle,
                    phase: newBone.phase + Math.PI // Opposite phase for walk
                });
            }
            updateBoneList();
        }

        function updateBoneList() {
            boneListEl.innerHTML = '<div class="label">SKELETON DATA:</div>';
            animal.bones.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = 'bone-item';
                div.innerHTML = `<span>[${i}] ${b.type.toUpperCase()}</span> <span>LEN: ${Math.round(b.length)}</span>`;
                boneListEl.appendChild(div);
            });
        }

        function createRipple(x, y, power) {
            animal.ripples.push({ x, y, r: 0, a: 1, p: power });
        }

        // Main Loop
        function update() {
            // Movement Logic
            if (isMouseDown) {
                const dx = mouseX - animal.pos.x;
                const dy = mouseY - animal.pos.y;
                const dist = Math.hypot(dx, dy);
                
                animal.targetAngle = Math.atan2(dy, dx);
                const speedTarget = isRightClick ? 5 : 2;
                animal.speed += (speedTarget - animal.speed) * 0.05;
                
                // Slowly rotate head
                let diff = animal.targetAngle - animal.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                animal.angle += diff * 0.05;

                if (dist > 10) {
                    animal.pos.x += Math.cos(animal.angle) * animal.speed;
                    animal.pos.y += Math.sin(animal.angle) * animal.speed;
                }
            } else {
                animal.speed *= 0.95;
                // Idle movement
                animal.pos.x += Math.cos(animal.angle) * animal.speed;
                animal.pos.y += Math.sin(animal.angle) * animal.speed;
            }

            // Ripple Update
            animal.ripples.forEach((r, i) => {
                r.r += r.p * 2;
                r.a *= 0.96;
                if (r.a < 0.01) animal.ripples.splice(i, 1);
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.4)';
            ctx.fillRect(0, 0, width, height);

            // Draw Ripples
            ctx.lineWidth = 1;
            animal.ripples.forEach(r => {
                ctx.strokeStyle = `rgba(0, 255, 204, ${r.a})`;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                ctx.stroke();
            });

            // Calculate & Draw Skeleton
            const time = performance.now() * 0.005;
            const bonePositions = new Map();
            
            animal.bones.forEach(bone => {
                if (bone.type === 'head') {
                    bonePositions.set(bone.id, { x: animal.pos.x, y: animal.pos.y, angle: animal.angle });
                    // Draw Head
                    ctx.fillStyle = varColor();
                    ctx.beginPath();
                    ctx.arc(animal.pos.x, animal.pos.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                    return;
                }

                const parent = bonePositions.get(bone.parentId);
                if (!parent) return;

                // Progressive Motion Logic
                let animationOffset = 0;
                if (bone.type === 'moving') {
                    // Gait: Sine wave based on speed and global time
                    animationOffset = Math.sin(time * (1 + animal.speed * 0.5) + bone.phase) * (0.2 + animal.speed * 0.1);
                }

                const worldAngle = parent.angle + bone.angle + animationOffset;
                const ex = parent.x + Math.cos(worldAngle) * bone.length;
                const ey = parent.y + Math.sin(worldAngle) * bone.length;

                // Draw Bone
                ctx.strokeStyle = bone.type === 'moving' ? 'rgba(0, 255, 204, 0.8)' : 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = bone.type === 'moving' ? 2 : 1;
                ctx.beginPath();
                ctx.moveTo(parent.x, parent.y);
                ctx.lineTo(ex, ey);
                ctx.stroke();

                // Joint Circle
                ctx.fillStyle = bone.type === 'moving' ? '#00ffcc' : '#555';
                ctx.beginPath();
                ctx.arc(ex, ey, 3, 0, Math.PI * 2);
                ctx.fill();

                bonePositions.set(bone.id, { x: ex, y: ey, angle: worldAngle });
            });
        }

        function varColor() { return '#00ffcc'; }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        initAnimal();
        loop();
        
        // Initial build - some starter bones
        setTimeout(() => {
            selectedType = 'moving';
            symmetryEnabled = true;
            addBone(); // Legs 1
            addBone(); // Legs 2
            symmetryEnabled = false;
            selectedType = 'garment';
            addBone(); // Tail
        }, 100);

    </script>
</body>
</html>
