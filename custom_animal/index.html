<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Animal: Progressive Motion Lab</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ffcc;
            --editor-bg: #151515;
        }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Pretendard', sans-serif; overflow: hidden; display: flex; }
        
        /* Layout */
        #editor-panel {
            width: 320px; /* 초기 너비 */
            min-width: 250px;
            max-width: 600px;
            height: 100vh;
            background: var(--editor-bg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 100;
            overflow-x: hidden;
        }
        #resizer {
            width: 6px;
            height: 100vh;
            background: #222;
            cursor: col-resize;
            transition: background 0.2s;
            z-index: 110;
        }
        #resizer:hover, #resizer.dragging {
            background: var(--accent);
        }
        #world {
            flex: 1;
            height: 100vh;
            position: relative;
            min-width: 0; /* flex container 내부 캔버스 찌그러짐 방지 */
        }
        
        /* UI */
        h1 { font-size: 14px; font-weight: 200; letter-spacing: 3px; margin-bottom: 30px; color: var(--accent); }
        .controls { display: flex; flex-direction: column; gap: 15px; }
        .control-group { background: #222; padding: 15px; border-radius: 10px; font-size: 11px; }
        #editor-canvas-container {
            width: 100%;
            height: 300px; /* 초기 높이 상향 */
            min-height: 150px;
            max-height: 80vh;
            background: #000;
            border: 1px dashed #444;
            margin-bottom: 0;
            position: relative;
            border-radius: 10px 10px 0 0;
            overflow: hidden;
        }
        #editor-v-resizer {
            width: 100%;
            height: 8px;
            background: #222;
            cursor: row-resize;
            margin-bottom: 15px;
            border-radius: 0 0 10px 10px;
            transition: background 0.2s;
        }
        #editor-v-resizer:hover, #editor-v-resizer.dragging {
            background: var(--accent);
        }
        #apply-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            margin-top: 10px;
            letter-spacing: 2px;
        }
        #apply-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        .label { opacity: 0.5; margin-bottom: 8px; display: block; }
        button { 
            background: #333; border: 1px solid #444; color: #eee; padding: 8px; cursor: pointer; border-radius: 5px; font-family: inherit; font-size: 11px;
            transition: all 0.2s;
        }
        button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        button.active { background: var(--accent); color: #000; }
        
        .bone-list { margin-top: 20px; flex: 1; overflow-y: auto; font-size: 10px; opacity: 0.7; }
        .bone-item { padding: 5px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .bone-item.selected { background: rgba(0, 255, 204, 0.2); border-left: 2px solid var(--accent); }
        
        canvas { display: block; width: 100%; height: 100%; }
        
        .editor-help { font-size: 9px; color: #888; margin-top: 10px; line-height: 1.4; }
        .instructions {
            position: absolute; bottom: 30px; right: 30px; font-size: 11px; opacity: 0.3; text-align: right; pointer-events: none;
        }
        .back-btn { position: absolute; top: 20px; right: 20px; color: #fff; text-decoration: none; font-size: 11px; opacity: 0.3; z-index: 100; }
    </style>
</head>
<body>

    <div id="editor-panel">
        <h1>커스텀 애니멀<br>유전학 실험실</h1>
        
        <div id="editor-canvas-container">
            <canvas id="editor-canvas"></canvas>
        </div>
        <div id="editor-v-resizer"></div>

        <div class="controls">
            <button id="apply-btn">월드에 적용하기</button>
            
            <div class="editor-help">
                • 관절(점) 클릭: 연결할 부모 선택<br>
                • 빈 공간 클릭: 선택된 곳에 새 뼈대 추가
            </div>

            <div class="control-group">
                <span class="label">부위 설정</span>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button id="add-move-btn" class="active">관절 부위</button>
                    <button id="add-garment-btn">장식 부위</button>
                </div>
                <button id="delete-btn" style="margin-top: 5px; width: 100%; border-color: #555;">마지막 부위 삭제</button>
            </div>
            
            <div class="control-group">
                <span class="label">옵션</span>
                <button id="symmetry-btn">대칭 모드: 끔</button>
                <div style="margin-top: 15px;">
                    <span class="label">이동 속도 배율: <span id="speed-val">1.0</span>x</span>
                    <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1" style="width: 100%; accent-color: var(--accent);">
                </div>
                <button id="reset-btn" style="margin-top: 15px; width: 100%; color: #ff5555;">모두 초기화</button>
            </div>
        </div>

        <div class="bone-list" id="bone-list">
            <div class="label">골격 데이터:</div>
            <!-- Bones will be listed here -->
        </div>
    </div>

    <div id="resizer"></div>

    <div id="world">
        <a href="../index.html" class="back-btn">← 나가기</a>
        <canvas id="canvas"></canvas>
        <div class="instructions">
            왼쪽 클릭: 잔잔한 걸음 (유도)<br>
            오른쪽 클릭: 빠른 질주 (유도)<br>
            에디터 캔버스를 클릭하여 뼈대를 설계하세요.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const editorCanvas = document.getElementById('editor-canvas');
        const editorCtx = editorCanvas.getContext('2d');
        const boneListEl = document.getElementById('bone-list');
        const speedSlider = document.getElementById('speed-slider');
        const speedValEl = document.getElementById('speed-val');
        const applyBtn = document.getElementById('apply-btn');
        const deleteBtn = document.getElementById('delete-btn');
        const resizer = document.getElementById('resizer');
        const editorVResizer = document.getElementById('editor-v-resizer');
        const editorPanel = document.getElementById('editor-panel');
        const editorCanvasContainer = document.getElementById('editor-canvas-container');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let isRightClick = false;
        let isMouseDown = false;
        let rippleTimer = 0;
        let isResizingH = false;
        let isResizingV = false;

        // Resizer Logic (Horizontal)
        resizer.onmousedown = (e) => {
            isResizingH = true;
            resizer.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        };

        // Editor Vertical Resizer Logic
        editorVResizer.onmousedown = (e) => {
            isResizingV = true;
            editorVResizer.classList.add('dragging');
            document.body.style.cursor = 'row-resize';
            e.preventDefault();
        };

        window.addEventListener('mousemove', (e) => {
            if (isResizingH) {
                let newWidth = e.clientX;
                if (newWidth >= 250 && newWidth <= 600) {
                    editorPanel.style.width = newWidth + 'px';
                    resize();
                }
            } else if (isResizingV) {
                const rect = editorCanvasContainer.getBoundingClientRect();
                let newHeight = e.clientY - rect.top;
                if (newHeight >= 150 && newHeight <= window.innerHeight * 0.8) {
                    editorCanvasContainer.style.height = newHeight + 'px';
                    resize();
                }
            } else {
                const rect = canvas.getBoundingClientRect();
                mouseX = e.clientX - rect.left;
                mouseY = e.clientY - rect.top;
            }
        });

        window.addEventListener('mouseup', () => {
            if (isResizingH) {
                isResizingH = false;
                resizer.classList.remove('dragging');
            }
            if (isResizingV) {
                isResizingV = false;
                editorVResizer.classList.remove('dragging');
            }
            document.body.style.cursor = 'default';
            isMouseDown = false;
        });

        // Editor State
        let selectedType = 'moving';
        let symmetryEnabled = false;
        let speedMultiplier = 1.0;
        let selectedBoneId = 0; // 현재 선택된 부모 ID
        let blueprintBones = [
            { id: 0, parentId: null, length: 0, angle: 0, currentAngle: 0, type: 'head', phase: 0, computedX: 140, computedY: 100 }
        ];
        
        // Speed Slider Event
        speedSlider.oninput = (e) => {
            speedMultiplier = parseFloat(e.target.value);
            speedValEl.innerText = speedMultiplier.toFixed(1);
        };

        // Animal State
        const animal = {
            pos: { x: 0, y: 0 },
            vel: { x: 0, y: 0 },
            angle: 0,
            targetAngle: 0,
            speed: 0,
            bones: [],
            ripples: [],
            bgParticles: []
        };

        // Initialize Head
        function initAnimal() {
            animal.pos = { x: (window.innerWidth - 320) / 2 + 320, y: window.innerHeight / 2 };
            blueprintBones = [
                { id: 0, parentId: null, length: 0, angle: 0, currentAngle: 0, type: 'head', phase: 0, computedX: 140, computedY: 100 }
            ];
            selectedBoneId = 0;
            animal.bones = JSON.parse(JSON.stringify(blueprintBones));
            updateBoneList();
            
            // 초기 입자 생성
            animal.bgParticles = [];
            for(let i=0; i<80; i++) {
                animal.bgParticles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: Math.random() * 3 + 1,
                    alpha: Math.random() * 0.15 + 0.05
                });
            }
        }

        function resize() {
            const panelW = editorPanel.offsetWidth;
            const resizerW = resizer.offsetWidth;
            width = window.innerWidth - panelW - resizerW;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            editorCanvas.width = panelW - 40;
            editorCanvas.height = 200;
        }

        window.addEventListener('resize', resize);
        resize();

        // Interaction
        window.addEventListener('contextmenu', e => e.preventDefault());
        
        canvas.addEventListener('mousedown', e => {
            isMouseDown = true;
            isRightClick = e.button === 2;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            createRipple(x, y, isRightClick ? 1.5 : 0.8);
            
            // Play Sounds
            if (isRightClick) {
                soundRight.currentTime = 0;
                soundRight.play();
            } else {
                soundLeft.currentTime = 0;
                soundLeft.play();
            }
        });
        
        window.addEventListener('mouseup', () => isMouseDown = false);

        applyBtn.onclick = () => {
            animal.bones = JSON.parse(JSON.stringify(blueprintBones));
            applyBtn.innerText = '적용 완료!';
            setTimeout(() => applyBtn.innerText = '월드에 적용하기', 1000);
        };

        deleteBtn.onclick = () => {
            if (blueprintBones.length > 1) {
                const last = blueprintBones.pop();
                if (last.id % 2 !== 0 && blueprintBones[blueprintBones.length-1].id === last.id - 1) {
                    blueprintBones.pop();
                }
                selectedBoneId = blueprintBones[blueprintBones.length-1].id;
                updateBoneList();
            }
        };

        // Editor Logic
        document.getElementById('add-move-btn').onclick = () => {
            selectedType = 'moving';
            document.getElementById('add-move-btn').className = 'active';
            document.getElementById('add-garment-btn').className = '';
        };
        document.getElementById('add-garment-btn').onclick = () => {
            selectedType = 'garment';
            document.getElementById('add-garment-btn').className = 'active';
            document.getElementById('add-move-btn').className = '';
        };
        document.getElementById('symmetry-btn').onclick = () => {
            symmetryEnabled = !symmetryEnabled;
            document.getElementById('symmetry-btn').innerText = `대칭 모드: ${symmetryEnabled ? '켬' : '끔'}`;
            document.getElementById('symmetry-btn').style.color = symmetryEnabled ? '#00ffcc' : '#fff';
        };
        document.getElementById('reset-btn').onclick = () => initAnimal();

        editorCanvas.onclick = (e) => {
            const rect = editorCanvas.getBoundingClientRect();
            const ex = e.clientX - rect.left;
            const ey = e.clientY - rect.top;

            const clickedBone = blueprintBones.find(b => {
                return Math.hypot(ex - b.computedX, ey - b.computedY) < 15;
            });

            if (clickedBone) {
                selectedBoneId = clickedBone.id;
                updateBoneList();
                return;
            }

            addBoneAt(ex, ey);
        };

        function addBoneAt(targetX, targetY) {
            const parent = blueprintBones.find(b => b.id === selectedBoneId);
            if (!parent) return;

            const centerX = editorCanvas.width / 2;
            const px = parent.computedX;
            const py = parent.computedY;
            
            const dx = targetX - px;
            const dy = targetY - py;
            const dist = Math.hypot(dx, dy);
            if (dist < 10) return;

            // 로컬 좌표계로 변환 (부모 기준)
            const id = Date.now();
            
            // 뼈대 생성 함수
            const createNewBone = (pId, x, y, isMirror = false) => {
                const p = blueprintBones.find(b => b.id === pId);
                const relDx = x - p.computedX;
                const relDy = y - p.computedY;
                const relAngle = Math.atan2(relDy, relDx);

                return {
                    id: isMirror ? id + 1 : id,
                    parentId: pId,
                    length: Math.hypot(relDx, relDy),
                    angle: relAngle, // 에디터에서는 절대각, 월드에서는 상대각으로 해석됨
                    type: selectedType,
                    phase: Math.random() * Math.PI * 2 + (isMirror ? Math.PI : 0),
                    isMirror: isMirror
                };
            };

            const newBone = createNewBone(parent.id, targetX, targetY);
            blueprintBones.push(newBone);

            if (symmetryEnabled) {
                let mirrorParentId = parent.id;
                // 부모가 mirror 상태라면 짝을 찾아 연결
                if (parent.parentId !== null) {
                    const mirrorParent = blueprintBones.find(b => b.parentId === parent.parentId && b.id !== parent.id && b.isMirror !== parent.isMirror);
                    if (mirrorParent) mirrorParentId = mirrorParent.id;
                }

                const mirrorX = centerX - (targetX - centerX);
                const mirrorBone = createNewBone(mirrorParentId, mirrorX, targetY, true);
                blueprintBones.push(mirrorBone);
            }

            selectedBoneId = newBone.id;
            updateBoneList();
        }

        function updateBoneList() {
            boneListEl.innerHTML = '<div class="label">골격 데이터:</div>';
            blueprintBones.forEach((b, i) => {
                const div = document.createElement('div');
                div.className = `bone-item ${b.id === selectedBoneId ? 'selected' : ''}`;
                const typeMap = { 'head': '머리', 'moving': '관절', 'garment': '장식' };
                div.innerHTML = `<span>[${i}] ${typeMap[b.type]}</span> <span>길이: ${Math.round(b.length)}</span>`;
                div.onclick = (e) => { e.stopPropagation(); selectedBoneId = b.id; updateBoneList(); };
                boneListEl.appendChild(div);
            });
        }

        function createRipple(x, y, power) {
            const color = power > 3 ? '255, 120, 0' : '0, 255, 204';
            animal.ripples.push({ x, y, r: 0, a: 1, p: power, color: color });
        }

        // Main Loop
        function update() {
            // Movement Logic
            if (isMouseDown) {
                // 드래그 중 주기적 파문 생성 빈도 하향 (15 -> 45프레임)
                rippleTimer++;
                if (rippleTimer % 45 === 0) {
                    createRipple(mouseX, mouseY, isRightClick ? 1.5 : 0.8);
                }

                const dx = mouseX - animal.pos.x;
                const dy = mouseY - animal.pos.y;
                const dist = Math.hypot(dx, dy);
                
                animal.targetAngle = Math.atan2(dy, dx);
                const speedTarget = (isRightClick ? 5 : 2) * speedMultiplier;
                animal.speed += (speedTarget - animal.speed) * 0.05;
                
                // Slowly rotate head
                let diff = animal.targetAngle - animal.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                animal.angle += diff * 0.05;

                if (dist > 10) {
                    animal.pos.x += Math.cos(animal.angle) * animal.speed;
                    animal.pos.y += Math.sin(animal.angle) * animal.speed;
                }
            } else {
                animal.speed *= 0.95;
                // Idle movement
                animal.pos.x += Math.cos(animal.angle) * animal.speed;
                animal.pos.y += Math.sin(animal.angle) * animal.speed;
            }

            // Ripple Update
            animal.ripples.forEach((r, i) => {
                r.r += r.p * 1.2; // 확산 속도 대폭 하향 (3 -> 1.2)
                r.a *= 0.96; // 조금 더 천천히 소멸 (0.94 -> 0.96)
                if (r.a < 0.01) animal.ripples.splice(i, 1);
            });

            // BG Particle Update
            animal.bgParticles.forEach(p => {
                if (isMouseDown) {
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const dist = Math.hypot(dx, dy);
                    const forceRadius = isRightClick ? 300 : 200;
                    
                    if (dist < forceRadius) {
                        const force = (1 - dist / forceRadius) * (isRightClick ? 1.5 : 0.4);
                        p.vx += (dx / dist) * force;
                        p.vy += (dy / dist) * force;
                    }
                }

                p.x += p.vx;
                p.y += p.vy;
                
                // 서서히 원래 속도로 감쇄 (마찰력)
                p.vx *= 0.97;
                p.vy *= 0.97;

                // 최소한의 유영 속도 유지
                p.vx += (Math.random() - 0.5) * 0.02;
                p.vy += (Math.random() - 0.5) * 0.02;

                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
            });
        }

        function drawSkeleton(targetCtx, bones, startX, startY, baseAngle, timeScale = 0, isEditor = false) {
            const bonePositions = new Map();
            const time = performance.now() * 0.005 * timeScale;
            const centerX = isEditor ? editorCanvas.width / 2 : 0;

            bones.forEach(bone => {
                if (bone.type === 'head') {
                    bone.computedX = isEditor ? centerX : startX;
                    bone.computedY = isEditor ? 100 : startY;
                    bonePositions.set(bone.id, { x: bone.computedX, y: bone.computedY, angle: isEditor ? -Math.PI/2 : baseAngle });
                    
                    targetCtx.fillStyle = bone.id === selectedBoneId && isEditor ? '#ffcc00' : '#00ffcc';
                    targetCtx.beginPath();
                    targetCtx.arc(bone.computedX, bone.computedY, 5, 0, Math.PI * 2);
                    targetCtx.fill();
                    return;
                }

                const parent = bonePositions.get(bone.parentId);
                if (!parent) return;

                let worldAngle;
                if (isEditor) {
                    // 에디터에서는 저장된 절대각 유지
                    worldAngle = bone.angle;
                } else {
                    // 월드에서는 부모 각도 + (저장된 각 - 초기 상태 각) + 애니메이션
                    let animationOffset = 0;
                    if (bone.type === 'moving' && timeScale > 0) {
                        animationOffset = Math.sin(time * (1 + animal.speed * 0.5) + bone.phase) * (0.2 + animal.speed * 0.1);
                    }
                    // bone.angle - (-Math.PI/2) : 에디터의 기본 정렬(위쪽) 대비 상대각 계산
                    worldAngle = parent.angle + (bone.angle - (-Math.PI / 2)) + animationOffset;
                }

                const ex = parent.x + Math.cos(worldAngle) * bone.length;
                const ey = parent.y + Math.sin(worldAngle) * bone.length;

                bone.computedX = ex;
                bone.computedY = ey;

                targetCtx.strokeStyle = bone.type === 'moving' ? 'rgba(0, 255, 204, 0.8)' : 'rgba(255, 255, 255, 0.3)';
                if (bone.id === selectedBoneId && isEditor) targetCtx.strokeStyle = '#ffcc00';
                
                targetCtx.lineWidth = bone.type === 'moving' ? 2 : 1;
                targetCtx.beginPath();
                targetCtx.moveTo(parent.x, parent.y);
                targetCtx.lineTo(ex, ey);
                targetCtx.stroke();

                targetCtx.fillStyle = bone.type === 'moving' ? '#00ffcc' : '#555';
                if (bone.id === selectedBoneId && isEditor) targetCtx.fillStyle = '#ffcc00';
                
                targetCtx.beginPath();
                targetCtx.arc(ex, ey, 2.5, 0, Math.PI * 2);
                targetCtx.fill();

                bonePositions.set(bone.id, { x: ex, y: ey, angle: worldAngle });
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.4)';
            ctx.fillRect(0, 0, width, height);

            // Draw Background Particles
            animal.bgParticles.forEach(p => {
                ctx.fillStyle = `rgba(200, 200, 200, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw World Ripples
            animal.ripples.forEach(r => {
                ctx.lineWidth = 2 + r.a * 3;
                ctx.strokeStyle = `rgba(${r.color}, ${r.a})`;
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = `rgba(${r.color}, ${r.a * 0.7})`;
                ctx.beginPath();
                ctx.arc(r.x, r.y, 5 * r.a, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw World Animal
            drawSkeleton(ctx, animal.bones, animal.pos.x, animal.pos.y, animal.angle, speedMultiplier, false);

            // Draw Editor Blueprint
            editorCtx.fillStyle = '#000';
            editorCtx.fillRect(0, 0, editorCanvas.width, editorCanvas.height);
            
            // Center axis indicator (Symmetry line)
            const centerX = editorCanvas.width / 2;
            editorCtx.strokeStyle = symmetryEnabled ? 'rgba(0, 255, 204, 0.2)' : '#222';
            editorCtx.setLineDash([5, 5]);
            editorCtx.beginPath();
            editorCtx.moveTo(centerX, 0); editorCtx.lineTo(centerX, editorCanvas.height);
            editorCtx.stroke();
            editorCtx.setLineDash([]);

            drawSkeleton(editorCtx, blueprintBones, centerX, 100, -Math.PI / 2, 0, true); 
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        initAnimal();
        loop();
        
        // Initial build
        setTimeout(() => {
            selectedType = 'moving';
            symmetryEnabled = true;
            addBone();
            addBone();
            selectedType = 'garment';
            symmetryEnabled = false;
            addBone();
            // 자동 적용
            animal.bones = JSON.parse(JSON.stringify(blueprintBones));
        }, 100);

    </script>
</body>
</html>
