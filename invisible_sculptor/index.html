<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보이지 않는 미로 - THE INVISIBLE SCULPTOR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f5f5f7;
            color: #333;
            font-family: 'Pretendard', sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 16px; font-weight: 300; letter-spacing: 1px; color: #111; }
        p { margin: 5px 0 0; font-size: 10px; opacity: 0.5; }
        .hint {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #111;
            opacity: 0.3;
            letter-spacing: 1px;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            color: #111;
            text-decoration: none;
            font-size: 11px;
            opacity: 0.4;
            padding: 8px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 30px;
        }
        #back-btn:hover { opacity: 1; background: #fff; }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← EXIT SCENE</a>
    <div class="ui">
        <h1>INVISIBLE SCULPTOR</h1>
        <p>REVEAL THE HIDDEN TERRAIN</p>
    </div>
    <div class="hint">마우스를 움직여 투명한 지형 위에 모래를 쏟아보세요</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const staticCanvas = document.createElement('canvas');
        const sCtx = staticCanvas.getContext('2d');

        let width, height;
        let particles = [];
        let terrain = [];
        const resolution = 6; // Grid resolution for heightmap

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            staticCanvas.width = width;
            staticCanvas.height = height;
            generateTerrain();
        }

        function generateTerrain() {
            terrain = [];
            const cols = Math.floor(width / resolution);
            const rows = Math.floor(height / resolution);
            
            // Using some random radial gradients to create invisible hills/walls
            const features = [];
            for (let i = 0; i < 5; i++) {
                features.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: 100 + Math.random() * 200,
                    h: 50 + Math.random() * 150
                });
            }

            for (let x = 0; x < cols; x++) {
                terrain[x] = [];
                for (let y = 0; y < rows; y++) {
                    let h = 0;
                    const tx = x * resolution;
                    const ty = y * resolution;
                    
                    features.forEach(f => {
                        const dist = Math.hypot(tx - f.x, ty - f.y);
                        if (dist < f.r) {
                            h += (1 - dist / f.r) * f.h;
                        }
                    });
                    terrain[x][y] = h;
                }
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * 4 + 2;
                this.color = `rgba(0, 0, 0, ${0.1 + Math.random() * 0.2})`;
                this.size = Math.random() * 2 + 1;
                this.isStatic = false;
            }

            update() {
                if (this.isStatic) return;

                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15; // Gravity

                const col = Math.floor(this.x / resolution);
                const row = Math.floor(this.y / resolution);

                if (terrain[col] && terrain[col][row]) {
                    // Check if we hit the hidden terrain "surface"
                    // Imagine z-axis being height. Higher h means the surface is closer to us.
                    // Here we'll simulate depth by checking if the particle's "life" is over.
                    // Simulating a 3D floor with 2D perspective
                    if (this.y > (height * 0.8) - terrain[col][row]) {
                        this.isStatic = true;
                        // Draw permanently on static canvas
                        sCtx.fillStyle = this.color;
                        sCtx.beginPath();
                        sCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        sCtx.fill();
                    }
                }

                if (this.y > height + 20) this.isStatic = true; // Cleanup
            }

            draw() {
                if (this.isStatic) return;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            // Pour particles from mouse
            for(let i=0; i<3; i++) {
                particles.push(new Particle(e.clientX + (Math.random()-0.5)*15, e.clientY));
            }
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw static "revealed" terrain
            ctx.drawImage(staticCanvas, 0, 0);

            particles = particles.filter(p => !p.isStatic);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (particles.length > 2000) particles.splice(0, 100);

            requestAnimationFrame(animate);
        }

        resize();
        animate();
    </script>
</body>
</html>
