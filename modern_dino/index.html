<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dino: Performance Art</title>
    <style>
        :root {
            --bg-color: #f7f7f7;
            --accent-color: #333;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            line-height: 0;
        }
        canvas {
            display: block;
        }
        #ui {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #ui.visible {
            opacity: 1;
        }
        button {
            padding: 10px 25px;
            font-family: inherit;
            background: white;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #eee;
            border-color: #999;
        }
        .instructions {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="ui">
        <div class="instructions">SPACE TO JUMP (HOLD FOR HIGHER) | TOUCH SCREEN</div>
        <div style="display: flex; gap: 15px;">
            <button id="restartBtn">RESTART</button>
            <button id="clearBtn">CLEAR CANVAS</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const restartBtn = document.getElementById('restartBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Assets
        const imgPath = 'assets/';
        const images = {
            walk1: new Image(),
            walk2: new Image(),
            jump: new Image(),
            end: new Image(),
            bg: new Image()
        };
        images.walk1.src = imgPath + 'walk_1.png';
        images.walk2.src = imgPath + 'walk_2.png';
        images.jump.src = imgPath + 'jump.png';
        images.end.src = imgPath + 'end.png';
        images.bg.src = imgPath + 'canvas.png';

        const audio = {
            drumroll: new Audio(imgPath + 'drumroll.MP3'),
            symbal: new Audio(imgPath + 'crashsymbal.MP3')
        };
        audio.drumroll.loop = true;

        // Constants
        const GROUND_Y_OFFSET = 20;
        const GRAVITY = 0.6;
        const SPEED = 4.2;
        const JITTER_AMOUNT = 0.8;

        // Game State
        let width, height;
        let dino = {
            x: 0,
            y: 0,
            vy: 0,
            isJumping: false,
            state: 'walk', // walk, jump, end
            animFrame: 0
        };
        let jumpPressStartTime = 0;
        let isPressing = false;
        let trail = [];
        let historyCanvas;
        let historyCtx;

        function init() {
            width = Math.min(window.innerWidth * 0.9, 1000);
            height = 500;
            canvas.width = width;
            canvas.height = height;

            if (!historyCanvas) {
                historyCanvas = document.createElement('canvas');
                historyCanvas.width = width;
                historyCanvas.height = height;
                historyCtx = historyCanvas.getContext('2d');
                historyCtx.fillStyle = 'white';
                historyCtx.fillRect(0, 0, width, height);
            }

            resetDino();
            requestAnimationFrame(tick);
        }

        function resetDino() {
            dino.x = 20;
            dino.y = height - GROUND_Y_OFFSET - 47;
            dino.vy = 0;
            dino.isJumping = false;
            dino.state = 'walk';
            dino.animFrame = 0;
            trail = [{x: dino.x + 22, y: dino.y + 45}];
            
            ui.classList.remove('visible');
            audio.drumroll.currentTime = 0;
            audio.drumroll.play();
        }

        function tick() {
            update();
            draw();
            if (dino.state !== 'end') {
                requestAnimationFrame(tick);
            } else {
                ui.classList.add('visible');
            }
        }

        function update() {
            if (dino.state === 'end') return;

            dino.x += SPEED;
            
            if (dino.isJumping) {
                dino.vy += GRAVITY;
                // 점프 중에는 평소의 1.5배 지터 적용
                dino.y += dino.vy + (Math.random() - 0.5) * JITTER_AMOUNT * 1.5;
                dino.state = 'jump';

                if (dino.y >= height - GROUND_Y_OFFSET - 47) {
                    dino.y = height - GROUND_Y_OFFSET - 47;
                    endGame();
                }
            } else {
                dino.y += (Math.random() - 0.5) * JITTER_AMOUNT;
                dino.state = 'walk';
                dino.animFrame++;
            }

            if (dino.x > width - 44) {
                dino.x = width - 44;
                endGame();
            }

            trail.push({x: dino.x + 22, y: dino.y + 45});
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw Background Image (canvas.png)
            if (images.bg.complete) {
                ctx.drawImage(images.bg, 0, 0, width, height);
            }

            // Draw History (Faded Layer)
            ctx.globalAlpha = 1.0;
            ctx.drawImage(historyCanvas, 0, 0);

            // Draw Current Trail
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(0,0,0,0.8)';
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            if (trail.length > 0) {
                ctx.moveTo(trail[0].x, trail[0].y);
                for (let i = 1; i < trail.length; i++) {
                    ctx.lineTo(trail[i].x, trail[i].y);
                }
            }
            ctx.stroke();

            // Draw Dino
            ctx.globalAlpha = 1.0;
            let img;
            if (dino.state === 'end') img = images.end;
            else if (dino.state === 'jump') img = images.jump;
            else img = (Math.floor(dino.animFrame / 8) % 2 === 0) ? images.walk1 : images.walk2;
            
            ctx.drawImage(img, dino.x, dino.y, 44, 47);
        }

        function endGame() {
            if (dino.state === 'end') return;
            dino.state = 'end';
            audio.drumroll.pause();
            audio.symbal.currentTime = 0;
            audio.symbal.play();

            historyCtx.globalAlpha = 0.15;
            historyCtx.beginPath();
            historyCtx.strokeStyle = 'black';
            historyCtx.lineWidth = 2.5;
            if (trail.length > 0) {
                historyCtx.moveTo(trail[0].x, trail[0].y);
                for (let i = 1; i < trail.length; i++) {
                    historyCtx.lineTo(trail[i].x, trail[i].y);
                }
            }
            historyCtx.stroke();
            historyCtx.globalAlpha = 1.0;
        }

        function handleJumpStart() {
            if (dino.state === 'end' || dino.isJumping) return;
            jumpPressStartTime = performance.now();
            isPressing = true;
        }

        function handleJumpEnd() {
            if (!isPressing || dino.isJumping) return;
            isPressing = false;
            
            const pressDuration = performance.now() - jumpPressStartTime;
            // 0.1s ~ 0.4s 사이에서 선형적으로 힘 결정
            const ratio = Math.min(Math.max((pressDuration - 100) / 300, 0), 1);
            
            const minH = height * 0.35;
            const maxH = height * 0.85;
            const targetH = minH + (maxH - minH) * ratio;
            
            dino.vy = -Math.sqrt(2 * GRAVITY * targetH);
            dino.isJumping = true;
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                e.preventDefault();
                handleJumpStart();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') handleJumpEnd();
        });
        
        canvas.addEventListener('mousedown', (e) => { e.preventDefault(); handleJumpStart(); });
        window.addEventListener('mouseup', handleJumpEnd);
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleJumpStart(); });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); handleJumpEnd(); });

        restartBtn.addEventListener('click', () => { resetDino(); requestAnimationFrame(tick); });
        clearBtn.addEventListener('click', () => {
            historyCtx.clearRect(0, 0, width, height);
            historyCtx.fillStyle = 'white';
            historyCtx.fillRect(0, 0, width, height);
            resetDino();
            requestAnimationFrame(tick);
        });

        window.onload = init;
    </script>
</body>
</html>
