<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윈도우 유체 시뮬레이터 - STABLE FLUID v6.0</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020205;
            color: #00d2ff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 210, 255, 0.05);
            padding: 10px 15px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        h1 { margin: 0; font-size: 12px; letter-spacing: 1px; }
        .data { margin-top: 5px; font-size: 10px; opacity: 0.6; }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
            color: #00d2ff;
            text-decoration: none;
            font-size: 10px;
            padding: 5px 12px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← EXIT</a>
    <div class="ui">
        <h1>Stable Fluid Engine v6.0</h1>
        <div class="data" id="debug">SYSTEM: CALIBRATING...</div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const debugEl = document.getElementById('debug');

        let width, height;
        let particles = [];
        
        // Tuning for Stability & Feel
        const RADIUS = 18;        // Interaction radius
        const STIFFNESS = 0.15;   // Repulsion strength
        const VISCOSITY = 0.94;   // Velocity damping (Higher = more honey-like)
        const GRAVITY = 0.15;     // Constant downward force
        const INERTIA_SENSE = 0.15; // How much window move affects fluid (0.0 to 1.0)
        const MAX_VEL = 15;       // Speed limit to prevent "flashing"

        let lastWinX = null, lastWinY = null;
        let winVX = 0, winVY = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
            }

            update() {
                // Apply constant forces
                this.vy += GRAVITY;
                
                // Window inertia (Dampened)
                this.vx -= winVX * INERTIA_SENSE;
                this.vy -= winVY * INERTIA_SENSE;

                // Move
                this.x += this.vx;
                this.y += this.vy;

                // Air friction / Viscosity
                this.vx *= VISCOSITY;
                this.vy *= VISCOSITY;

                // Speed Limit
                const speed = Math.hypot(this.vx, this.vy);
                if (speed > MAX_VEL) {
                    this.vx = (this.vx / speed) * MAX_VEL;
                    this.vy = (this.vy / speed) * MAX_VEL;
                }

                // Wall Collisions
                const pad = 10;
                if (this.x < pad) { this.x = pad; this.vx *= -0.5; }
                if (this.x > width - pad) { this.x = width - pad; this.vx *= -0.5; }
                if (this.y < pad) { this.y = pad; this.vy *= -0.5; }
                if (this.y > height - pad) { this.y = height - pad; this.vy *= -0.5; }
            }
        }

        function init() {
            resize();
            particles = [];
            const cols = 20;
            const rows = 12;
            const spacing = RADIUS * 0.8;
            const startX = width / 2 - (cols * spacing) / 2;
            const startY = height / 2 - (rows * spacing) / 2;
            
            for (let i = 0; i < cols * rows; i++) {
                particles.push(new Particle(
                    startX + (i % cols) * spacing,
                    startY + Math.floor(i / cols) * spacing
                ));
            }
            lastWinX = window.screenX;
            lastWinY = window.screenY;
        }

        function resolveCollisions() {
            // Simple but stable repulsion physics
            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < RADIUS) {
                        const overlap = RADIUS - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        
                        // Push away based on stiffness
                        const force = overlap * STIFFNESS;
                        p1.vx -= nx * force;
                        p1.vy -= ny * force;
                        p2.vx += nx * force;
                        p2.vy += ny * force;
                    }
                }
            }
        }

        window.addEventListener('resize', resize);

        function animate() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, width, height);

            if (lastWinX !== null) {
                // Smooth window velocity tracking
                const curWinVX = window.screenX - lastWinX;
                const curWinVY = window.screenY - lastWinY;
                winVX = winVX * 0.8 + curWinVX * 0.2;
                winVY = winVY * 0.8 + curWinVY * 0.2;
            }
            lastWinX = window.screenX;
            lastWinY = window.screenY;

            // Physics steps
            resolveCollisions();
            particles.forEach(p => p.update());

            // Rendering
            ctx.fillStyle = '#00d2ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00d2ff';
            for (let p of particles) {
                if (isNaN(p.x) || isNaN(p.y)) continue;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            debugEl.innerText = `WIN VEL: [${winVX.toFixed(0)}, ${winVY.toFixed(0)}] | STATUS: STABLE`;
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
