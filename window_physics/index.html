<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윈도우 유체 시뮬레이터 - LIQUID v7.0</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #010103;
            color: #00f0ff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
            /* Dense liquid look: lower blur for smaller particles */
            filter: blur(5px) contrast(20);
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 240, 255, 0.05);
            padding: 8px 12px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            pointer-events: none;
            backdrop-filter: blur(5px);
            filter: none !important;
        }
        h1 { margin: 0; font-size: 11px; letter-spacing: 1px; }
        .data { margin-top: 4px; font-size: 9px; opacity: 0.6; }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
            color: #00f0ff;
            text-decoration: none;
            font-size: 10px;
            padding: 4px 10px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
            filter: none !important;
        }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← EXIT</a>
    <div class="ui">
        <h1>Dense Liquid Engine v8.0</h1>
        <div class="data" id="debug">SYSTEM: CALIBRATING...</div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const debugEl = document.getElementById('debug');

        let width, height;
        let particles = [];
        
        // Liquid Constants - High Density Tuning
        const RADIUS = 11;        // Smaller radius for more detail
        const STIFFNESS = 0.3;    // Slightly stronger repulsion for small particles
        const VISCOSITY = 0.955;  // More cohesive than water, less than syrup
        const GRAVITY = 0.28;     
        const INERTIA_SENSE = 0.22; 
        const MAX_VEL = 22;

        let lastWinX = null, lastWinY = null;
        let lastInnerW = window.innerWidth, lastInnerH = window.innerHeight;
        let winVX = 0, winVY = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.radius = 7 + Math.random() * 3; // Smaller particles
            }

            update(dw, dh, wvx, wvy) {
                this.vy += GRAVITY;
                
                // Remove global inertia - only boundary forces will act now
                // this.vx -= winVX * INERTIA_SENSE;
                // this.vy -= winVY * INERTIA_SENSE;

                this.x += this.vx;
                this.y += this.vy;

                this.vx *= VISCOSITY;
                this.vy *= VISCOSITY;

                const pad = this.radius;
                
                // Boundary Physics: Walls now exert force based on BOTH resize (dw/dh) AND move (wvx/wvy)
                // Left Wall
                if (this.x < pad) { 
                    this.x = pad; 
                    // If wall moves towards particle (wvx < 0) or shrinks (dw < 0)
                    let push = (wvx < 0 ? Math.abs(wvx) : 0) + (dw < 0 ? Math.abs(dw) * 0.5 : 0);
                    this.vx = Math.abs(this.vx) * 0.3 + push * 0.8; 
                }
                // Right Wall
                if (this.x > width - pad) { 
                    this.x = width - pad; 
                    // If wall moves towards particle (wvx > 0) or shrinks (dw < 0)
                    let push = (wvx > 0 ? wvx : 0) + (dw < 0 ? Math.abs(dw) * 0.5 : 0);
                    this.vx = -Math.abs(this.vx) * 0.3 - push * 0.8; 
                }
                // Top Wall
                if (this.y < pad) { 
                    this.y = pad; 
                    let push = (wvy < 0 ? Math.abs(wvy) : 0) + (dh < 0 ? Math.abs(dh) * 0.5 : 0);
                    this.vy = Math.abs(this.vy) * 0.3 + push * 0.8; 
                }
                // Bottom Wall
                if (this.y > height - pad) { 
                    this.y = height - pad; 
                    let push = (wvy > 0 ? wvy : 0) + (dh < 0 ? Math.abs(dh) * 0.5 : 0);
                    this.vy = -Math.abs(this.vy) * 0.3 - push * 0.8; 
                }

                const speed = Math.hypot(this.vx, this.vy);
                if (speed > MAX_VEL) {
                    this.vx = (this.vx / speed) * MAX_VEL;
                    this.vy = (this.vy / speed) * MAX_VEL;
                }
            }
        }

        function init() {
            resize();
            particles = [];
            const count = 900; 
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(
                    width/2 + (Math.random()-0.5) * 400,
                    height/2 + (Math.random()-0.5) * 400
                ));
            }
            lastWinX = window.screenX;
            lastWinY = window.screenY;
            lastInnerW = window.innerWidth;
            lastInnerH = window.innerHeight;
        }

        function resolveCollisions() {
            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const distSq = dx * dx + dy * dy;

                    if (distSq < RADIUS * RADIUS) {
                        const dist = Math.sqrt(distSq) || 0.1;
                        const overlap = RADIUS - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        
                        const force = overlap * STIFFNESS;
                        p1.vx -= nx * force;
                        p1.vy -= ny * force;
                        p2.vx += nx * force;
                        p2.vy += ny * force;
                    }
                }
            }
        }

        window.addEventListener('resize', () => {});

        function animate() {
            const dw = window.innerWidth - lastInnerW;
            const dh = window.innerHeight - lastInnerH;
            
            // Raw window velocity
            const wvx = window.screenX - lastWinX;
            const wvy = window.screenY - lastWinY;

            resize();
            
            ctx.fillStyle = '#010103';
            ctx.fillRect(0, 0, width, height);

            lastWinX = window.screenX;
            lastWinY = window.screenY;
            lastInnerW = window.innerWidth;
            lastInnerH = window.innerHeight;

            // Physics
            resolveCollisions();
            particles.forEach(p => p.update(dw, dh, wvx, wvy));

            // Rendering
            ctx.fillStyle = '#00f0ff';
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            debugEl.innerText = `LIQUID PARTICLES: ${particles.length} | BW: ${dw.toFixed(0)}`;
            requestAnimationFrame(animate);
        }

            init();
            animate();
    </script>
</body>
</html>
