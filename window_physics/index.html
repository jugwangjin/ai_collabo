<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비압축 유체 시뮬레이터 - INCOMPRESSIBLE FLUID PHYSICS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #030306;
            color: #00d2ff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 210, 255, 0.05);
            padding: 12px 18px;
            border-radius: 4px;
            border: 1px solid rgba(0, 210, 255, 0.4);
            pointer-events: none;
            backdrop-filter: blur(8px);
        }
        h1 { margin: 0; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
        .data { margin-top: 8px; font-size: 10px; opacity: 0.7; font-variant-numeric: tabular-nums; }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
            color: #00d2ff;
            text-decoration: none;
            font-size: 10px;
            padding: 6px 12px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 20px;
            pointer-events: auto;
            transition: all 0.2s;
        }
        #back-btn:hover { background: rgba(0, 210, 255, 0.1); border-color: #00d2ff; }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← TERMINAL EXIT</a>
    <div class="ui">
        <h1>Fluid Dynamics v4.0</h1>
        <div class="data" id="debug">
            SYSTEM: STABLE<br>
            DENSITY: CALCULATING...
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const debugEl = document.getElementById('debug');

        let width, height;
        let particles = [];
        
        // SPH / Fluid Constants - Tuned for Stability
        const H = 26;           // Interaction radius
        const GAS_CONST = 1200; // Lowered for softer pressure
        const RHO0 = 1.0;       // Target rest density
        const VISC = 400;       // Higher viscosity for "syrup-like" stability
        const MASS = 1.0;
        const DT = 0.4;         // Smaller time step for stability
        const BOUNDARY_DAMPING = -0.3;

        let lastWinX = null;
        let lastWinY = null;
        let winVX = 0;
        let winVY = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.fx = 0; this.fy = 0;
                this.rho = 0; this.p = 0;
            }
        }

        function init() {
            resize();
            particles = [];
            // Create a dense block of fluid in the center
            const cols = 22;
            const rows = 16;
            const spacing = H * 0.5;
            const startX = width / 2 - (cols * spacing) / 2;
            const startY = height / 2 - (rows * spacing) / 2;
            
            for (let i = 0; i < cols * rows; i++) {
                particles.push(new Particle(
                    startX + (i % cols) * spacing,
                    startY + Math.floor(i / cols) * spacing
                ));
            }
            lastWinX = window.screenX;
            lastWinY = window.screenY;
        }

        function computeDensityPressure() {
            for (let p1 of particles) {
                p1.rho = 0;
                for (let p2 of particles) {
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const d2 = dx * dx + dy * dy;
                    if (d2 < H * H) {
                        p1.rho += MASS * (315 / (64 * Math.PI * Math.pow(H, 9))) * Math.pow(H * H - d2, 3);
                    }
                }
                // Linear pressure for better stability
                p1.p = GAS_CONST * (p1.rho - RHO0);
                if (p1.p < 0) p1.p = 0;
            }
        }

        function computeForces() {
            for (let p1 of particles) {
                let fpressX = 0, fpressY = 0;
                let fviscX = 0, fviscY = 0;

                for (let p2 of particles) {
                    if (p1 === p2) continue;
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const d = Math.sqrt(dx * dx + dy * dy);

                    if (d < H && d > 0.5) {
                        // Pressure force
                        const fp = MASS * (p1.p + p2.p) / (2 * p2.rho) * (-45 / (Math.PI * Math.pow(H, 6))) * Math.pow(H - d, 2);
                        fpressX += fp * dx / d;
                        fpressY += fp * dy / d;

                        // Viscosity force
                        const fv = VISC * MASS * (45 / (Math.PI * Math.pow(H, 6))) * (H - d);
                        fviscX += fv * (p2.vx - p1.vx) / p2.rho;
                        fviscY += fv * (p2.vy - p1.vy) / p2.rho;
                    }
                }

                // Smoothly dampen window inertia
                const fextX = -winVX * 0.2; 
                const fextY = -winVY * 0.2;

                p1.fx = fpressX + fviscX + fextX;
                p1.fy = fpressY + fviscY + fextY;
            }
        }

        function integrate() {
            for (let p of particles) {
                p.vx += DT * p.fx / p.rho;
                p.vy += DT * p.fy / p.rho;
                p.x += DT * p.vx;
                p.y += DT * p.vy;

                const pad = 8;
                if (p.x < pad) { p.x = pad; p.vx *= BOUNDARY_DAMPING; }
                if (p.x > width - pad) { p.x = width - pad; p.vx *= BOUNDARY_DAMPING; }
                if (p.y < pad) { p.y = pad; p.vy *= BOUNDARY_DAMPING; }
                if (p.y > height - pad) { p.y = height - pad; p.vy *= BOUNDARY_DAMPING; }
            }
        }

        function animate() {
            ctx.fillStyle = '#030306';
            ctx.fillRect(0, 0, width, height);

            if (lastWinX !== null) {
                // Low-pass filter for window movement to avoid jitter
                winVX = (window.screenX - lastWinX) * 0.5 + winVX * 0.5;
                winVY = (window.screenY - lastWinY) * 0.5 + winVY * 0.5;
            }
            lastWinX = window.screenX;
            lastWinY = window.screenY;

            // Substepping: Run physics multiple times per frame for stability
            const substeps = 3;
            for(let i=0; i<substeps; i++) {
                computeDensityPressure();
                computeForces();
                integrate();
            }

            ctx.fillStyle = '#00d2ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00d2ff';
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3.2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
