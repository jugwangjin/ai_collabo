<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윈도우 유체 시뮬레이터 - CONFIGURABLE v10.0</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #010103;
            color: #00f0ff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
            filter: blur(6px) contrast(20);
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 240, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.15);
            pointer-events: auto;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            transform-origin: top left;
            width: 180px;
        }
        .controls.hidden {
            opacity: 0;
            transform: scale(0.8) translateY(-20px);
            pointer-events: none;
        }
        #toggle-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 101;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: #00f0ff;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        .controls-active #toggle-controls {
            left: 215px;
            background: #00f0ff;
            color: black;
        }
        h1 { margin: 0 0 10px 0; font-size: 14px; color: #00f0ff; letter-spacing: 1px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; opacity: 0.7; }
        input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #fff;
            padding: 5px;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }
        .btn {
            width: 100%;
            background: rgba(0, 240, 255, 0.2);
            border: 1px solid #00f0ff;
            color: #00f0ff;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 5px;
            transition: all 0.2s;
        }
        .btn:hover { background: #00f0ff; color: black; }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
            color: #00f0ff;
            text-decoration: none;
            font-size: 10px;
            padding: 8px 15px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 20px;
        }
    </style>
</head>
<body class="controls-active">
    <a href="../index.html" id="back-btn">← EXIT</a>
    
    <button id="toggle-controls">⚙️</button>
    
    <div class="controls" id="controls-panel">
        <h1>WINDOW FLUID</h1>
        <div class="input-group">
            <label>입자 개수 (100 - 2500)</label>
            <input type="number" id="particle-count" value="800" min="100" max="2500">
        </div>
        <button class="btn" id="apply-btn">설정 적용 및 초기화</button>
        <p style="font-size: 8px; opacity: 0.5; margin-top: 10px; line-height: 1.4;">
            * 입자가 많을수록 CPU 부하가 커집니다.<br>
            * 모바일에서는 500개 이하를 권장합니다.
        </p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        // Physics Config
        const RADIUS = 15;        
        const STIFFNESS = 0.2;   
        const VISCOSITY = 0.94;   
        const GRAVITY = 0.25;     
        const MAX_VEL = 20;
        const INERTIA_GLOBAL = 0.12; // 은은한 글로벌 관성 (창 전체 영향)

        let lastWinX = null, lastWinY = null;
        let lastInnerW = window.innerWidth, lastInnerH = window.innerHeight;
        let pCount = 800;

        // UI Logic
        const toggleBtn = document.getElementById('toggle-controls');
        const panel = document.getElementById('controls-panel');
        const countInput = document.getElementById('particle-count');
        const applyBtn = document.getElementById('apply-btn');

        toggleBtn.addEventListener('click', () => {
            panel.classList.toggle('hidden');
            document.body.classList.toggle('controls-active');
            toggleBtn.innerHTML = panel.classList.contains('hidden') ? '⚙️' : '✕';
        });

        applyBtn.addEventListener('click', () => {
            let val = parseInt(countInput.value);
            if (isNaN(val)) val = 800;
            pCount = Math.min(Math.max(val, 100), 2500);
            countInput.value = pCount;
            init();
        });

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.radius = 7 + Math.random() * 3;
            }

            update(dw, dh, wvx, wvy) {
                // 글로벌 관성 (창 전체가 움직일 때 은은하게 영향)
                this.vx -= wvx * INERTIA_GLOBAL;
                this.vy -= wvy * INERTIA_GLOBAL;

                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= VISCOSITY;
                this.vy *= VISCOSITY;

                const pad = this.radius;
                
                if (this.x < pad) { 
                    this.x = pad; 
                    let push = (wvx < 0 ? Math.abs(wvx) : 0) + (dw < 0 ? Math.abs(dw) * 0.5 : 0);
                    this.vx = Math.abs(this.vx) * 0.3 + push * 0.8; 
                }
                if (this.x > width - pad) { 
                    this.x = width - pad; 
                    let push = (wvx > 0 ? wvx : 0) + (dw < 0 ? Math.abs(dw) * 0.5 : 0);
                    this.vx = -Math.abs(this.vx) * 0.3 - push * 0.8; 
                }
                if (this.y < pad) { 
                    this.y = pad; 
                    let push = (wvy < 0 ? Math.abs(wvy) : 0) + (dh < 0 ? Math.abs(dh) * 0.5 : 0);
                    this.vy = Math.abs(this.vy) * 0.3 + push * 0.8; 
                }
                if (this.y > height - pad) { 
                    this.y = height - pad; 
                    let push = (wvy > 0 ? wvy : 0) + (dh < 0 ? Math.abs(dh) * 0.5 : 0);
                    this.vy = -Math.abs(this.vy) * 0.3 - push * 0.8; 
                }

                const speed = Math.hypot(this.vx, this.vy);
                if (speed > MAX_VEL) {
                    this.vx = (this.vx / speed) * MAX_VEL;
                    this.vy = (this.vy / speed) * MAX_VEL;
                }
            }
        }

        function init() {
            resize();
            particles = [];
            for (let i = 0; i < pCount; i++) {
                particles.push(new Particle(
                    width/2 + (Math.random()-0.5) * 400,
                    height/2 + (Math.random()-0.5) * 400
                ));
            }
            lastWinX = window.screenX;
            lastWinY = window.screenY;
            lastInnerW = window.innerWidth;
            lastInnerH = window.innerHeight;
        }

        function resolveCollisions() {
            for (let i = 0; i < particles.length; i++) {
                const p1 = particles[i];
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const distSq = dx * dx + dy * dy;

                    if (distSq < RADIUS * RADIUS) {
                        const dist = Math.sqrt(distSq) || 0.1;
                        const overlap = RADIUS - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const force = overlap * STIFFNESS;
                        p1.vx -= nx * force;
                        p1.vy -= ny * force;
                        p2.vx += nx * force;
                        p2.vy += ny * force;
                    }
                }
            }
        }

        function animate() {
            const dw = window.innerWidth - lastInnerW;
            const dh = window.innerHeight - lastInnerH;
            const wvx = window.screenX - lastWinX;
            const wvy = window.screenY - lastWinY;

            resize();
            ctx.fillStyle = '#010103';
            ctx.fillRect(0, 0, width, height);

            lastWinX = window.screenX;
            lastWinY = window.screenY;
            lastInnerW = window.innerWidth;
            lastInnerH = window.innerHeight;

            resolveCollisions();
            particles.forEach(p => p.update(dw, dh, wvx, wvy));

            ctx.fillStyle = '#00f0ff';
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
