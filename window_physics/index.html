<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윈도우 유체 시뮬레이터 - SPH FLUID PHYSICS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020205;
            color: #4488ff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(68, 136, 255, 0.05);
            padding: 15px;
            border: 1px solid #4488ff;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        h1 { margin: 0; font-size: 14px; letter-spacing: 2px; }
        .data { margin-top: 10px; font-size: 10px; line-height: 1.4; opacity: 0.8; }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
            color: #4488ff;
            text-decoration: none;
            font-size: 10px;
            padding: 5px 10px;
            border: 1px solid #4488ff;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← SYSTEM EXIT</a>
    <div class="ui">
        <h1>SPH FLUID ENGINE v3.0</h1>
        <div class="data" id="debug">
            PARTICLES: 0<br>
            STABILITY: 100%
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const debugEl = document.getElementById('debug');

        let width, height;
        let particles = [];
        
        // SPH Constants
        const H = 35;           // Smoothing radius
        const GAS_CONST = 2500; // Pressure constant
        const RHO0 = 1.0;       // Rest density
        const VISC = 250;       // Viscosity constant
        const MASS = 1.0;       // Particle mass
        const DT = 0.8;         // Time step

        let lastWinX = window.screenX;
        let lastWinY = window.screenY;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = 0; this.vy = 0;
                this.fx = 0; this.fy = 0;
                this.rho = 0; this.p = 0;
            }
        }

        function init() {
            resize();
            particles = [];
            const rowLen = 12;
            const startX = width / 2 - (rowLen * H * 0.4) / 2;
            const startY = height / 2 - (rowLen * H * 0.4) / 2;
            
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(
                    startX + (i % rowLen) * H * 0.6,
                    startY + Math.floor(i / rowLen) * H * 0.6
                ));
            }
        }

        function computeDensityPressure() {
            for (let p1 of particles) {
                p1.rho = 0;
                for (let p2 of particles) {
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const d2 = dx * dx + dy * dy;
                    if (d2 < H * H) {
                        p1.rho += MASS * (315 / (64 * Math.PI * Math.pow(H, 9))) * Math.pow(H * H - d2, 3);
                    }
                }
                p1.p = GAS_CONST * (p1.rho - RHO0);
            }
        }

        function computeForces(winVX, winVY) {
            for (let p1 of particles) {
                let fpressX = 0, fpressY = 0;
                let fviscX = 0, fviscY = 0;

                for (let p2 of particles) {
                    if (p1 === p2) continue;
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    const d = Math.sqrt(dx * dx + dy * dy);

                    if (d < H) {
                        // Pressure force
                        const fp = -MASS * (p1.p + p2.p) / (2 * p2.rho) * (-45 / (Math.PI * Math.pow(H, 6))) * Math.pow(H - d, 2);
                        fpressX += fp * dx / d;
                        fpressY += fp * dy / d;

                        // Viscosity force
                        const fv = VISC * MASS * (45 / (Math.PI * Math.pow(H, 6))) * (H - d);
                        fviscX += fv * (p2.vx - p1.vx) / p2.rho;
                        fviscY += fv * (p2.vy - p1.vy) / p2.rho;
                    }
                }

                // External force (Window Inertia)
                const fextX = -winVX * 0.5;
                const fextY = -winVY * 0.5;

                // Wall Forces (Simple penalty method)
                const wallK = 500;
                const pad = 10;
                if (p1.x < pad) p1.fx += (pad - p1.x) * wallK;
                if (p1.x > width - pad) p1.fx += (width - pad - p1.x) * wallK;
                if (p1.y < pad) p1.fy += (pad - p1.y) * wallK;
                if (p1.y > height - pad) p1.fy += (height - pad - p1.y) * wallK;

                p1.fx = fpressX + fviscX + fextX;
                p1.fy = fpressY + fviscY + fextY;
            }
        }

        function integrate() {
            for (let p of particles) {
                p.vx += DT * p.fx / p.rho;
                p.vy += DT * p.fy / p.rho;
                p.x += DT * p.vx;
                p.y += DT * p.vy;

                // Bounce & Friction
                if (p.x < 0) { p.x = 0; p.vx *= -0.3; }
                if (p.x > width) { p.x = width; p.vx *= -0.3; }
                if (p.y < 0) { p.y = 0; p.vy *= -0.3; }
                if (p.y > height) { p.y = height; p.vy *= -0.3; }
            }
        }

        function animate() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, width, height);

            const winVX = window.screenX - lastWinX;
            const winVY = window.screenY - lastWinY;
            lastWinX = window.screenX;
            lastWinY = window.screenY;

            // Substepping for stability
            const substeps = 2;
            for(let i=0; i<substeps; i++) {
                computeDensityPressure();
                computeForces(winVX / substeps, winVY / substeps);
                integrate();
            }

            // Rendering with glow
            ctx.fillStyle = '#4488ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#4488ff';
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            debugEl.innerHTML = `PARTICLES: ${particles.length}<br>WIN VEL: [${winVX}, ${winVY}]`;
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
