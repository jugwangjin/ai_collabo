<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>윈도우 슬라임 물리 - WINDOW SLIME PHYSICS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
            /* Metaball effect filter */
            filter: blur(12px) contrast(25);
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 255, 204, 0.05);
            padding: 15px;
            border: 1px solid #00ffcc;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        h1 { margin: 0; font-size: 14px; letter-spacing: 2px; }
        .data { margin-top: 10px; font-size: 10px; line-height: 1.4; opacity: 0.8; }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 101;
            color: #00ffcc;
            text-decoration: none;
            font-size: 10px;
            padding: 5px 10px;
            border: 1px solid #00ffcc;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← SYSTEM EXIT</a>
    <div class="ui">
        <h1>WINDOW SLIME v1.0</h1>
        <div class="data" id="debug">
            INERTIA: 0.0<br>
            PRESSURE: 0.0
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const debugEl = document.getElementById('debug');

        let width, height;
        let particles = [];
        
        let lastWinX = window.screenX;
        let lastWinY = window.screenY;
        let lastWinW = window.innerWidth;
        let lastWinH = window.innerHeight;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = Math.random() * 15 + 20;
            }

            update(winVX, winVY, pressure) {
                // Apply inertia from window move
                this.vx -= winVX * 0.6;
                this.vy -= winVY * 0.6;

                // Random jitter from pressure
                this.vx += (Math.random() - 0.5) * pressure * 10;
                this.vy += (Math.random() - 0.5) * pressure * 10;

                // Movement
                this.x += this.vx;
                this.y += this.vy;

                // Friction / Viscosity
                this.vx *= 0.92;
                this.vy *= 0.92;

                // Gentle return to center (gravity-like)
                this.vx += (width/2 - this.x) * 0.001;
                this.vy += (height/2 - this.y) * 0.001;

                // Wall Collisions
                const pad = this.radius;
                if (this.x < pad) { this.x = pad; this.vx *= -0.5; }
                if (this.x > width - pad) { this.x = width - pad; this.vx *= -0.5; }
                if (this.y < pad) { this.y = pad; this.vy *= -0.5; }
                if (this.y > height - pad) { this.y = height - pad; this.vy *= -0.5; }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00ffcc';
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = [];
            for (let i = 0; i < 25; i++) {
                particles.push(new Particle(
                    width/2 + (Math.random()-0.5)*100,
                    height/2 + (Math.random()-0.5)*100
                ));
            }
        }

        window.addEventListener('resize', resize);

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Window Logic
            const winVX = window.screenX - lastWinX;
            const winVY = window.screenY - lastWinY;
            const winVW = window.innerWidth - lastWinW;
            const winVH = window.innerHeight - lastWinH;
            
            const pressure = Math.abs(winVW) + Math.abs(winVH);
            const inertia = Math.hypot(winVX, winVY);

            lastWinX = window.screenX;
            lastWinY = window.screenY;
            lastWinW = window.innerWidth;
            lastWinH = window.innerHeight;

            debugEl.innerHTML = `INERTIA: ${inertia.toFixed(1)}<br>PRESSURE: ${pressure.toFixed(1)}`;

            particles.forEach(p => {
                p.update(winVX, winVY, pressure);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
