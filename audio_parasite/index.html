<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시각적 도청기 - AUDIO VISUAL PARASITE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 20, 0, 0.8);
            padding: 15px;
            border: 1px solid #00ff00;
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 14px; letter-spacing: 2px; }
        p { margin: 5px 0 0; font-size: 10px; opacity: 0.7; }
        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: #0f0;
            opacity: 0.5;
            letter-spacing: 2px;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            color: #0f0;
            text-decoration: none;
            font-size: 11px;
            padding: 5px 10px;
            border: 1px solid #0f0;
        }
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: black;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 20px 40px;
            cursor: pointer;
            font-family: inherit;
            font-size: 18px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <button id="start-btn">마이크 권한 허용 및 시작</button>
    <a href="../index.html" id="back-btn">← TERMINAL EXIT</a>
    <div class="ui">
        <h1>AUDIO PARASITE v2.0</h1>
        <p>SONIC FREQUENCY VISUALIZATION</p>
    </div>
    <div class="hint">소리를 내거나 노래를 틀어보세요. 주파수가 형태를 만듭니다.</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');

        let width, height;
        let audioCtx, analyser, dataArray;
        let isStarted = false;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        startBtn.addEventListener('click', initAudio);

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                isStarted = true;
                startBtn.style.display = 'none';
                animate();
            } catch (err) {
                alert("마이크 권한이 필요합니다.");
            }
        }

        function drawParasite(energy) {
            const centerX = width / 2;
            const centerY = height / 2;
            const points = 120;
            const baseRadius = Math.min(width, height) * 0.25;
            
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#00ff00';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff00';

            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                
                // Frequency data affects radius
                const freqIndex = Math.floor((i / points) * dataArray.length);
                const freqVal = dataArray[freqIndex] || 0;
                
                const noise = Math.sin(angle * 5 + Date.now() * 0.005) * 20;
                const r = baseRadius + (freqVal * 0.8) + noise;
                
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            
            ctx.closePath();
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Inner core
            ctx.fillStyle = `rgba(0, 255, 0, ${energy * 0.005})`;
            ctx.fill();
        }

        function animate() {
            if (!isStarted) return;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            analyser.getByteFrequencyData(dataArray);
            
            let totalEnergy = 0;
            for(let i=0; i<dataArray.length; i++) totalEnergy += dataArray[i];
            const avgEnergy = totalEnergy / dataArray.length;

            drawParasite(avgEnergy);

            // Audio-reactive background bars
            ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
            const barWidth = width / dataArray.length;
            for(let i=0; i<dataArray.length; i++) {
                const h = dataArray[i];
                ctx.fillRect(i * barWidth, height - h, barWidth - 1, h);
                ctx.fillRect(i * barWidth, 0, barWidth - 1, h);
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
