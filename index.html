<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI랑 만든 쓰레기 모음</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Pretendard', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas#bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }
        h1 {
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 0.2rem;
            margin-bottom: 3rem;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            text-align: center;
            word-break: keep-all;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1000px;
            width: 90%;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-10px) scale(1.03);
            background: rgba(255, 255, 255, 0.1);
            border-color: #00ffcc;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.2);
        }
        .card h2 {
            margin: 0 0 0.8rem 0;
            font-weight: 500;
            color: #fff;
            font-size: 1.3rem;
        }
        .card p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.6;
            line-height: 1.5;
            word-break: keep-all;
        }
        .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <h1>AI랑 만든 쓰레기 모음</h1>
    <div class="container">
        <a href="./chaos_pendulum/index.html" class="card">
            <span class="emoji">🎨</span>
            <h2>카오스 페인터</h2>
            <p>이중 진자의 물리 법칙을 이용해 예측 불가능한 예술적 궤적을 그립니다.</p>
        </a>
        <a href="./microbe_colony/index.html" class="card">
            <span class="emoji">🧪</span>
            <h2>미생물 배양기</h2>
            <p>다양한 종의 미생물들이 번식하고 진화하는 유기적 시뮬레이션입니다.</p>
        </a>
        <a href="./neon_city/index.html" class="card">
            <span class="emoji">🏙️</span>
            <h2>절차적 도시의 밤</h2>
            <p>클릭할 때마다 솟아오르는 빌딩으로 화려한 네온 야경을 만듭니다.</p>
        </a>
    </div>

    <script>
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        let width, height;
        const dots = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < 60; i++) {
            dots.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4
            });
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#00ffcc';
            for (let dot of dots) {
                dot.x = (dot.x + dot.vx + width) % width;
                dot.y = (dot.y + dot.vy + height) % height;
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
